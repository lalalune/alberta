site_name: Alberta Framework
site_description: A research-first framework for the Alberta Plan - Building the foundations of Continual AI
site_url: https://lalalune.github.io/alberta
repo_url: https://github.com/lalalune/alberta
repo_name: lalalune/alberta

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: numpy
            docstring_options:
              ignore_init_summary: true
            merge_init_into_class: true
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            heading_level: 2
            filters: ["!^_"]
            inherited_members: true
            signature_crossrefs: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true
  - attr_list
  - md_in_html

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - User Guide:
    - Concepts: guide/concepts.md
    - Optimizers: guide/optimizers.md
    - Streams: guide/streams.md
    - SARSA Control: guide/sarsa-control.md
    - Actor-Critic Control: guide/actor-critic-control.md
    - Gymnasium Integration: guide/gymnasium.md
    - Daemon Usage: guide/daemon-usage.md
    - Experiments: guide/experiments.md
    - End-to-End Pipeline: guide/end-to-end-pipeline.md
    - Production Kernels: guide/step1-step2-production.md
  - Research:
    - Alberta Plan Audit: research/alberta_plan_audit.md
    - Step 1 Results: research/step1_results.md
    - Step 3 Results: research/step3_results.md
    - Step 4 Results: research/step4_results.md
    - Steps 5-6 Results: research/step5_step6_average_reward.md
    - Step 7 Results: research/step7_dyna_planning.md
  - Contributing: contributing.md
